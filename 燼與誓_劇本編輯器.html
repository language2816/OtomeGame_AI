<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0812;
    --bg2: #110e1f;
    --bg3: #1a1630;
    --border: rgba(180,160,255,0.15);
    --border2: rgba(180,160,255,0.3);
    --text: #e8e0ff;
    --text2: #a090c0;
    --text3: #6050a0;
    --accent: #c4a8f0;
    --gold: #f0e0a0;
    --rose: #f0a0a8;
    --green: #a0f0b0;
  }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  .header {
    padding: 1.5rem 2rem 1rem;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .title {
    font-family: 'Noto Serif TC', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.1em;
  }

  .subtitle {
    font-size: 12px;
    color: var(--text3);
    margin-top: 2px;
    letter-spacing: 0.05em;
  }

  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 0.5px solid var(--border);
    padding: 0 2rem;
    overflow-x: auto;
  }

  .tab {
    padding: 0.75rem 1.25rem;
    font-size: 13px;
    color: var(--text3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
    background: none;
    border-left: none;
    border-right: none;
    border-top: none;
  }

  .tab:hover { color: var(--text2); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .content { padding: 1.5rem 2rem; }

  .section-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    color: var(--accent);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .btn {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 20px;
    border: 0.5px solid var(--border2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover { background: var(--bg3); color: var(--text); border-color: var(--accent); }
  .btn.primary { border-color: var(--accent); color: var(--accent); }
  .btn.primary:hover { background: rgba(196,168,240,0.1); }
  .btn.danger:hover { border-color: var(--rose); color: var(--rose); }

  .char-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .char-card {
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    background: var(--bg2);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .char-card:hover { border-color: var(--border2); background: var(--bg3); }
  .char-card.selected { border-color: var(--accent); }

  .char-color-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
    vertical-align: middle;
  }

  .char-name {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    color: var(--text);
    margin-bottom: 4px;
  }

  .char-role {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 10px;
    letter-spacing: 0.05em;
  }

  .char-desc {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .char-actions {
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }

  .panel {
    border: 0.5px solid var(--border);
    border-radius: 12px;
    background: var(--bg2);
    padding: 1.5rem;
    margin-bottom: 1rem;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .form-group { margin-bottom: 1rem; }
  .form-group label {
    display: block;
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 6px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    border-color: var(--accent);
  }

  .form-group textarea { resize: vertical; min-height: 80px; line-height: 1.6; }

  .form-group select option { background: #1a1630; }

  .event-list { display: flex; flex-direction: column; gap: 0.75rem; }

  .event-item {
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    background: var(--bg2);
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .event-item:hover { border-color: var(--border2); }

  .event-affection {
    font-size: 11px;
    border-radius: 20px;
    padding: 3px 10px;
    border: 0.5px solid var(--border2);
    white-space: nowrap;
    margin-top: 2px;
    background: var(--bg3);
    color: var(--text2);
  }

  .event-title {
    font-size: 14px;
    color: var(--text);
    margin-bottom: 4px;
  }
  .event-desc {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.6;
  }

  .mood-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .mood-table th {
    text-align: left;
    padding: 8px 12px;
    color: var(--text3);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-bottom: 0.5px solid var(--border);
  }
  .mood-table td {
    padding: 10px 12px;
    border-bottom: 0.5px solid var(--border);
    color: var(--text2);
    vertical-align: middle;
  }
  .mood-table tr:last-child td { border-bottom: none; }
  .mood-table td:first-child { color: var(--text3); font-size: 12px; }

  .affection-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .affection-table th {
    text-align: left;
    padding: 8px 12px;
    color: var(--text3);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-bottom: 0.5px solid var(--border);
  }
  .affection-table td {
    padding: 10px 12px;
    border-bottom: 0.5px solid var(--border);
    color: var(--text2);
  }
  .affection-table tr:last-child td { border-bottom: none; }

  .badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    border: 0.5px solid;
    letter-spacing: 0.05em;
  }

  .timeline-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.75rem 0;
    border-bottom: 0.5px solid var(--border);
  }
  .timeline-row:last-child { border-bottom: none; }
  .timeline-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 0.5px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    color: var(--text3);
    flex-shrink: 0;
  }
  .timeline-label { font-size: 13px; color: var(--text2); flex: 1; }
  .timeline-edit {
    font-size: 11px;
    color: var(--text3);
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
    background: none;
    font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.2s;
  }
  .timeline-edit:hover { border-color: var(--accent); color: var(--accent); }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 1rem;
  }
  .modal {
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: 16px;
    padding: 2rem;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 16px;
    color: var(--accent);
    margin-bottom: 1.5rem;
  }
  .modal-actions {
    display: flex;
    gap: 0.75rem;
    justify-content: flex-end;
    margin-top: 1.5rem;
  }

  .tag {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    background: var(--bg3);
    color: var(--text3);
    border: 0.5px solid var(--border);
    margin-right: 4px;
  }

  .hidden { display: none !important; }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text3);
    font-size: 13px;
    line-height: 2;
  }

  .color-swatch {
    display: inline-block;
    width: 16px; height: 16px;
    border-radius: 4px;
    vertical-align: middle;
    margin-right: 6px;
    border: 0.5px solid rgba(255,255,255,0.1);
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="title">✦ 燼與誓 — 劇本編輯器</div>
    <div class="subtitle">Where Oaths Are Ash · Script Manager</div>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn" onclick="exportScript()">匯出劇本</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('chars')">角色管理</button>
  <button class="tab" onclick="switchTab('events')">特殊事件</button>
  <button class="tab" onclick="switchTab('timeline')">時間軸</button>
  <button class="tab" onclick="switchTab('system')">好感度系統</button>
  <button class="tab" onclick="switchTab('geography')">地理地形</button>
  <button class="tab" onclick="switchTab('world')">世界觀設定</button>
  <button class="tab" onclick="switchTab('magic')">魔法體系</button>
  <button class="tab" onclick="switchTab('factions')">勢力格局</button>
  <button class="tab" onclick="switchTab('images')">立繪管理</button>
</div>

<div class="content">

  <!-- 角色管理 -->
  <div id="tab-chars">
    <div class="section-title">
      <span>角色列表</span>
      <button class="btn primary" onclick="openCharModal()">＋ 新增角色</button>
    </div>
    <div class="char-grid" id="char-grid"></div>
  </div>

  <!-- 特殊事件 -->
  <div id="tab-events" class="hidden">
    <div class="section-title">
      <span>特殊事件</span>
      <button class="btn primary" onclick="openEventModal()">＋ 新增事件</button>
    </div>
    <div style="margin-bottom:1rem;display:flex;gap:8px;flex-wrap:wrap" id="event-char-filter"></div>
    <div class="event-list" id="event-list"></div>
  </div>

  <!-- 時間軸 -->
  <div id="tab-timeline" class="hidden">
    <div class="section-title">
      <span>劇情時間軸</span>
      <button class="btn primary" onclick="addTimelineStage()">＋ 新增階段</button>
    </div>
    <div class="panel" id="timeline-panel"></div>
  </div>

  <!-- 好感度系統 -->
  <div id="tab-system" class="hidden">
    <div class="section-title">
      <span>好感度系統設定</span>
      <button class="btn primary" onclick="openAffectionModal()">＋ 新增等級</button>
    </div>
    <div class="panel">
      <table class="affection-table" id="affection-table"></table>
    </div>
    <div class="section-title" style="margin-top:1.5rem">
      <span>系統參數</span>
    </div>
    <div class="panel">
      <div class="form-row">
        <div class="form-group">
          <label>每次對話最大增加</label>
          <input type="number" id="param-max-gain" value="15">
        </div>
        <div class="form-group">
          <label>每次對話最大減少</label>
          <input type="number" id="param-max-loss" value="10">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>True End 觸發好感度</label>
          <input type="number" id="param-true-end" value="100">
        </div>
        <div class="form-group">
          <label>好感度上限</label>
          <input type="number" id="param-max" value="100">
        </div>
      </div>
      <button class="btn primary" onclick="saveParams()">儲存設定</button>
    </div>
  </div>

  <!-- 地理地形 -->
  <div id="tab-geography" class="hidden">
    <div class="section-title"><span>世界地理與地形</span></div>

    <!-- 世界地圖 -->
    <div class="panel" style="padding:1rem;margin-bottom:1rem">
      <div class="section-title" style="font-size:13px;margin-bottom:0.75rem">
        <span>🗺️ 雅古利德大陸 — 世界地圖</span>
      </div>
      <img
        src="https://raw.githubusercontent.com/language2816/OtomeGame_AI/5c1b0e38a32820fe3f674de934dba4275add3f2c/%E4%B8%96%E7%95%8C%E5%9C%B0%E5%9C%96.png"
        alt="燼與誓 世界地圖"
        style="width:100%;border-radius:10px;border:0.5px solid var(--border);display:block;"
        onerror="this.style.opacity=0.3"
      >
    </div>

    <div class="panel">
      <div class="form-group">
        <label>主大陸信息</label>
        <textarea id="geo-continent" rows="4" placeholder="大陸名稱、形狀、尺寸等...">雅古利德大陸 — 東西寬闊延伸，南北略窄（類似哈薩克），整體厚實，海岸線不繁複。</textarea>
      </div>
      <div class="form-group">
        <label>地形分界線（三條）</label>
        <textarea id="geo-boundaries" rows="5" placeholder="分界線名稱、位置、功能...">1. 分脊河（西）- 古利德 ↔ 弗瑞亞，可渡，往來頻繁
2. 羅德羅斯山脈（東）- 古利德 ↔ 厄瑞斯，難以穿越，存在山口通道
3. 北方防線山脈（北）- 防守魔獸領地，北部要塞是最後堡壘</textarea>
      </div>
      <div class="form-group">
        <label>主要城市與駐地（距離參考）</label>
        <textarea id="geo-cities" rows="6" placeholder="城市、駐地、方向、距離...">• 波勒及（北 - 中央偏北）- 盧西安駐守
• 北部要塞（北 4-5天）- 卡利克斯駐守
• 祭神之森（西南 7天）- 席爾文駐守
• 沃爾斯港（南 6天）- 多里安據點
• 帕里村（西 3天）- 主角故鄉</textarea>
      </div>
      <div class="form-group">
        <label>外部勢力與領地</label>
        <textarea id="geo-powers" rows="4" placeholder="勢力名稱、位置、特徵...">弗瑞亞王廷（西方 - 獸人部落聯盟，獸王統治）
厄瑞斯帝國（東方 - 軍事擴張帝國，50年前滅瓦赫姆王國）
北方魔獸領地（北方 - 高密度魔物區）
阿薩大陸（南方隔海 - 魔族，崇尚和平）</textarea>
      </div>
      <div class="form-group">
        <label>地理與故事的連結</label>
        <textarea id="geo-story" rows="4" placeholder="地理如何推動敘事...">地理隔離 → 信息片段化 → 各方無法看清全貌 → 無人能阻止天秤傾斜
四位角色駐地分別在北、西、西南、南方 → 象徵被邊緣勢力包圍的古利德</textarea>
      </div>
      <button class="btn primary" onclick="alert('地理地形設定已檢視')">儲存地理設定</button>
    </div>
  </div>

  <!-- 魔法體系 -->
  <div id="tab-magic" class="hidden">
    <div class="section-title"><span>魔法體系設定</span></div>
    <div class="panel">
      <div class="form-group">
        <label>元素魔法（主流）</label>
        <textarea id="magic-element" rows="4">可教學、可量化的學術體系，按魔力強弱形成社會階層。每個人天生魔力不同，強弱差距可被測定，直接影響社會地位與政治資本。學術機構負責研究、授權與等級認證，是元素魔法的最高話語權掌握者。</textarea>
      </div>
      <div class="form-group">
        <label>符文魔法（古典）</label>
        <textarea id="magic-rune" rows="4">屬於古老傳承，與元素魔法體系平行但地位不同。需要精確的公式與書寫才能生效，無代價，但容錯率極低——寫錯一筆則完全無效。神殿體系是符文魔法最重要的保存者與使用者。</textarea>
      </div>
      <div class="form-group">
        <label>契約魔法（誓言）</label>
        <textarea id="magic-contract" rows="4">需要雙方自願同意方能成立，一旦締結便對雙方具有約束力。「誓言」在這個世界不只是語言，而是具有魔法效力的契約。</textarea>
      </div>
      <div class="form-group">
        <label>灰脈（特殊體質）</label>
        <textarea id="magic-grey" rows="5">古典文獻記載屬性為「無」——不屬於任何元素，也無法用符文公式捕捉或複製。本質是「想像力即魔法」——感應力來自無意識的想像與意志投射。持有者無法主動觸發，也無法關閉。靠近魔法印記、詛咒物、或帶有強烈意志的場所時，身體會先於意識有所反應。</textarea>
      </div>
      <div class="form-group">
        <label>天秤神話與異端神明</label>
        <textarea id="magic-balance" rows="5">世界由秩序（Orda）與混沌（Vael）共同創造「天秤」維持平衡。魔物是天秤的矯正機制——當世界某處力量過度積聚，魔物便出現消耗歸零。若天秤傾斜超過臨界點，「異端神明（The Unwritten）」將從裂縫中誕生——千年前古書有載，已被世人遺忘。</textarea>
      </div>
      <button class="btn primary" onclick="alert('魔法體系設定已儲存')">儲存魔法設定</button>
    </div>
  </div>

  <!-- 勢力格局 -->
  <div id="tab-factions" class="hidden">
    <div class="section-title">
      <span>勢力格局</span>
      <button class="btn primary" onclick="openFactionModal()">＋ 新增勢力</button>
    </div>
    <div id="faction-list" class="event-list"></div>
  </div>

  <!-- 立繪管理 -->
  <div id="tab-images" class="hidden">
    <div class="section-title"><span>角色立繪管理</span></div>
    <div class="panel">
      <div class="form-group">
        <label>GitHub Raw 圖片根路徑</label>
        <input type="text" id="img-base-url" value="https://raw.githubusercontent.com/language2816/OtomeGame_AI/5c1b0e38a32820fe3f674de934dba4275add3f2c/%E8%A7%92%E8%89%B2%E4%BA%BA%E7%89%A9/" placeholder="https://raw.githubusercontent.com/...">
      </div>
      <button class="btn primary" onclick="renderImages()" style="margin-top:0.5rem">載入立繪預覽</button>
    </div>
    <div id="image-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem;margin-top:1rem"></div>
  </div>

  <!-- 世界觀設定 -->
  <div id="tab-world" class="hidden">
    <div class="section-title"><span>世界觀設定</span></div>

    <div class="panel">
      <div class="form-group">
        <label>世界觀概述</label>
        <textarea id="world-overview" rows="4"></textarea>
      </div>
      <div class="form-group">
        <label>主角設定</label>
        <textarea id="world-protagonist" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label>敘事風格</label>
        <textarea id="world-style" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label>AI 敘事引擎 System Prompt 模板</label>

      voiceProfile:`【句型偏好】短句，陳述句為主，幾乎不用感嘆號。句尾常留白，讓對方自己補完意思。\n\n【禁忌詞】不說「我覺得」「也許」「可能」——他不猜測，只陳述。不用口語縮寫。\n\n【對主角說話】語氣比對其他人少一分距離，但他自己不承認。偶爾稱呼「你」時停頓略長。\n\n【對他人說話】更冷、更短。命令句居多，不解釋原因。\n\n【情緒變化】\n動搖時：句子更短，甚至只說一個詞，然後沉默。不是結巴，而是刻意截斷。\n在意時：反而問問題——但問的不是真正想問的，而是旁敲側擊的那種。\n憤怒時：語氣更平靜，字句更精準，讓人感到比吼叫更有壓迫感。\n溫柔時：不說甜言蜜語，而是說一句讓對方想了三天的話，然後若無其事離開。\n\n【錨定台詞】\n「你問的問題，我還沒決定要不要回答。」\n「留在這裡。不是命令——是請求。」\n「危險的不是這個地方。是你讓我開始在意這個地方。」\n\n【AI寫作提示】絕不主動解釋自己的動機。溫柔藏在動作裡不在台詞裡。旁白可描述他的手微微收緊。台詞永遠比他想說的少一半。` },

      voiceProfile:`【句型偏好】直接、口語、有時語句不完整——說到一半覺得夠了就停。偶爾爆粗口（輕度）。\n\n【禁忌詞】不說「我擔心你」「我在意你」——他永遠用行動替代這類話，說出口會讓他不舒服。\n\n【對主角說話】表面粗魯，但仔細聽會發現他從不真的貶低她。罵的都是情況，不是她這個人。\n\n【對他人說話】更簡短，沒耐心，指令式。對敵人則完全沉默——他不和敵人廢話。\n\n【情緒變化】\n動搖時：說話更快、更衝，像是要用語速壓過自己的情緒。\n在意時：突然多說了一句不必要的話，然後自己也察覺了，別過臉。\n憤怒時：聲音不一定大，但低沉，字咬得很清楚。這時候反而危險。\n溫柔時：聲音會低一個音，語速放慢，像是不確定自己在說什麼。說完會清嗓子掩飾。\n\n【錨定台詞】\n「行了，別看了。又沒受傷。」（他自己手臂在流血）\n「跟緊一點。不是因為我想管你——是這地方不安全。」\n「……謝什麼謝。多此一舉。」（他剛擋下了一劍）\n\n【AI寫作提示】關心永遠偽裝成抱怨。身體動作先於台詞。耳尖紅了但台詞還是很衝。絕不說「我愛你」只說「別走」。` },

      moods:['如沐春風的初見','分享古精靈語的秘密','望向遠方的憂傷','讓你走在光線較亮的那側','植物顫動，心意已動'],

function switchTab(name) {
  ['chars','events','timeline','system','geography','world','images','magic','factions'].forEach(t => {
    const el = document.getElementById('tab-'+t);
    if(el) el.classList.add('hidden');
  });
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  const target = document.getElementById('tab-'+name);
  if(target) target.classList.remove('hidden');
  event.target.classList.add('active');

  if(name==='events') renderEvents();
  if(name==='timeline') renderTimeline();
  if(name==='system') renderAffection();
  if(name==='world') renderWorld();
  if(name==='chars') renderChars();
  if(name==='images') renderImages();
  if(name==='magic') renderMagic();
  if(name==='factions') renderFactions();
}

function renderChars() {
  const grid = document.getElementById('char-grid');
  grid.innerHTML = state.chars.map(c => `
    <div class="char-card">
      <div class="char-name">
        <span class="char-color-dot" style="background:${c.color}"></span>
        ${c.fullname}
      </div>
      <div class="char-role">${c.role}</div>
      <div class="char-desc">${c.personality}</div>
      <div class="char-actions">
        <button class="btn" onclick="openCharModal(${c.id})">編輯</button>
        <button class="btn danger" onclick="deleteChar(${c.id})">刪除</button>
      </div>
    </div>
  `).join('');
}

function renderEvents() {
  const filter = document.getElementById('event-char-filter');
  filter.innerHTML = `<button class="btn ${state.eventFilter===null?'primary':''}" onclick="setEventFilter(null)">全部</button>` +
    state.chars.map(c => `<button class="btn ${state.eventFilter===c.id?'primary':''}" onclick="setEventFilter(${c.id})" style="border-color:${c.color}60;color:${c.color}">${c.name}</button>`).join('');

  const list = document.getElementById('event-list');
  const filtered = state.eventFilter ? state.events.filter(e=>e.charId===state.eventFilter) : state.events;
  if(!filtered.length) {
    list.innerHTML = '<div class="empty-state">尚無事件<br>點擊「新增事件」開始建立</div>';
    return;
  }
  list.innerHTML = filtered.map(e => {
    const char = state.chars.find(c=>c.id===e.charId);
    return `
    <div class="event-item">
      <div style="font-size:20px;line-height:1">${e.emoji||'✦'}</div>
      <div style="flex:1">
        <div class="event-title">${e.title} ${char?`<span class="tag" style="border-color:${char.color}50;color:${char.color}">${char.name}</span>`:''}</div>
        <div class="event-desc">${e.desc}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <div class="event-affection">好感度 ${e.affection}</div>
        <div style="display:flex;gap:4px">
          <button class="btn" onclick="openEventModal(${e.id})">編輯</button>
          <button class="btn danger" onclick="deleteEvent(${e.id})">刪除</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function setEventFilter(id) {
  state.eventFilter = id;
  renderEvents();
}

function renderTimeline() {
  const panel = document.getElementById('timeline-panel');
  panel.innerHTML = state.timeline.map((t,i) => `
    <div class="timeline-row">
      <div class="timeline-num">${t.stage}</div>
      <input style="flex:1;background:transparent;border:none;color:var(--text2);font-size:13px;font-family:'Noto Sans TC',sans-serif;outline:none" value="${t.title}" onchange="state.timeline[${i}].title=this.value">
      <button class="timeline-edit" onclick="removeTimelineStage(${i})">移除</button>
    </div>
  `).join('');
}

function addTimelineStage() {
  const next = state.timeline.length;
  state.timeline.push({stage:next,title:'新階段'});
  renderTimeline();
}

function removeTimelineStage(i) {
  state.timeline.splice(i,1);
  state.timeline.forEach((t,idx)=>t.stage=idx);
  renderTimeline();
}

function renderAffection() {
  const table = document.getElementById('affection-table');
  table.innerHTML = `<tr><th>好感度範圍</th><th>關係描述</th><th></th></tr>` +
    state.affection.map((a,i) => `
      <tr>
        <td>${a.min} – ${a.max}</td>
        <td>${a.label}</td>
        <td><button class="btn danger" style="font-size:10px;padding:3px 8px" onclick="deleteAffection(${i})">刪除</button></td>
      </tr>
    `).join('');
}

function exportScript() {
  const lines=[`# 燼與誓 — 劇本資料\n\n> Where Oaths Are Ash · 暗黑奇幻乙女物語\n\n*v2.0*\n`];
  lines.push(`## 世界觀設定\n- **世界觀**：${state.world.overview}\n- **主角**：${state.world.protagonist}\n- **風格**：${state.world.style}\n`);
  lines.push(`## 時間軸\n| 階段 | 標題 |\n|------|------|\n`);
  state.timeline.forEach(t=>lines.push(`| ${t.stage} | ${t.title} |\n`));
  lines.push(`\n## 好感度系統\n| 好感度範圍 | 關係描述 |\n|-----------|----------|\n`);
  state.affection.forEach(a=>lines.push(`| ${a.min} – ${a.max} | ${a.label} |\n`));
  state.chars.forEach(c=>{
    lines.push(`\n## 角色：${c.fullname}\n- **稱謂**：${c.name}\n- **身分**：${c.role}\n- **象徵色**：${c.color}\n- **場景色調**：${c.sceneColor}\n\n### 角色設定\n> ${c.personality}\n\n### 心境軌跡\n| 階段 | 心境描述 |\n|------|----------|\n`);
    c.moods.forEach((m,i)=>lines.push(`| ${i} | ${m} |\n`));
    const ev=state.events.filter(e=>e.charId===c.id).sort((a,b)=>a.affection-b.affection);
    if(ev.length) {
      lines.push(`\n### 特殊事件\n`);
      ev.forEach(e=>lines.push(`**${e.emoji} ${e.title}**（好感度 ${e.affection}）\n> ${e.desc}\n\n`));
    }
    lines.push(`### 開場引導詞\n> ${c.opening}\n\n### True End 結局\n> ${c.trueend}\n\n### 與標題對應結尾\n> ${c.titleend}\n\n### 語氣設定\n${c.voiceProfile||'（未設定）'}\n`);
  });
  lines.push(`\n## AI 敘事引擎 System Prompt\n\`\`\`\n${state.world.prompt}\n\`\`\`\n`);
  const blob=new Blob([lines.join('')],{type:'text/markdown'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='燼與誓_劇本.md';
  a.click();
}
